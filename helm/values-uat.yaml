microservice-chart:
  namespace: "bizevents"
  nameOverride: ""
  fullnameOverride: ""
  image:
    repository: ghcr.io/pagopa/pagopa-biz-events-service
    tag: "0.5.1"
    pullPolicy: Always
  livenessProbe:
    httpGet:
      path: /info
      port: 8080
    initialDelaySeconds: 30
    failureThreshold: 6
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /info
      port: 8080
    initialDelaySeconds: 30
    failureThreshold: 6
    periodSeconds: 10
  deployment:
    create: true
    replicas: 1 # equals to HPA min
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 0
        maxSurge: 1
  serviceMonitor:
    create: true
    endpoints:
      - interval: 10s #jmx-exporter
        targetPort: 12345
        path: /metrics
  ports:
    - 8080
  service:
    type: ClusterIP
    ports:
      - 8080 #http
      - 12345 #jmx-exporter
  ingress:
    create: true
    host: "weuuat.bizevents.internal.uat.platform.pagopa.it"
    path: /pagopa-biz-events-service/(.*)
    servicePort: 8080
    annotations: {nginx.ingress.kubernetes.io/proxy-buffer-size: "8k"}
  serviceAccount:
    name: "bizevents-workload-identity"
  azure:
    workloadIdentityClientId: <workload-identity-client-id-set-automatically-by-gha>
  podAnnotations: {}
  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
  resources:
    requests:
      memory: "640Mi"
      cpu: "500m"
    limits:
      memory: "1256Mi"
      cpu: "800m"
  autoscaling:
    enable: true
    minReplica: 3
    maxReplica: 20
    pollingInterval: 10 # seconds
    cooldownPeriod: 50 # seconds
    triggers:
      - type: cpu
        metadata:
          # Required
          type: Utilization # Allowed types are 'Utilization' or 'AverageValue'
          value: "75"
  envConfig:
    ENV: 'uat'
    WEBSITE_SITE_NAME: 'pagopabizeventsservice' # required to show cloud role name in application insights
    SERVICE_NAME: "pagopa-bizevents-service"
    COSMOS_DB_URI: 'https://pagopa-u-weu-bizevents-ds-cosmos-account.documents.azure.com:443/'
    COSMOS_DB_NAME: 'db'
    COSMOS_DB_CONTAINER_NAME: 'biz-events'
    COSMOS_DB_VIEW_USER_CONTAINER_NAME: 'biz-events-view-user'
    COSMOS_DB_VIEW_GENERAL_CONTAINER_NAME: 'biz-events-view-general'
    COSMOS_DB_VIEW_CART_CONTAINER_NAME: 'biz-events-view-cart'
    COSMOS_QUERY_METRICS: 'false'
    COSMOS_READ_REGION: 'West Europe'
    PDF_RECEIPT_HOST: 'https://api.uat.platform.pagopa.it/receipts/internal/service/v1'
    PDF_GENERATE_RECEIPT_HOST: 'https://api.uat.platform.pagopa.it/receipts/helpdesk/generator/v1'
    PDF_GENERATE_RECEIPT_PATH: '/receipts/{event-id}/regenerate-receipt-pdf'
    GET_PDF_RETRY_MAX_DELAY: "10000"
    GET_PDF_RETRY_MAX_ATTEMPTS: "1"
    GENERATE_PDF_RETRY_MAX_DELAY: "10000"
    GENERATE_PDF_RETRY_MAX_ATTEMPTS: "1"
    CONNECTION_TIMEOUT: "10000"
    CACHE_ENABLED: "true"
    CACHE_DEFAULT_EVICT_SECONDS: "10"
    CACHE_DEFAULT_SIZE: "50000"
    CACHE_NOTICE_LIST_EVICT_SECONDS: "30"
    CACHE_NOTICE_DETAILS_EVICT_SECONDS: "90"
    OTEL_SERVICE_NAME: "pagopa-bizevents-service"
    OTEL_RESOURCE_ATTRIBUTES: "deployment.environment=uat"
    OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.elastic-system.svc:4317"
    OTEL_LOGS_EXPORTER: none
    OTEL_TRACES_SAMPLER: "always_on"
  envFieldRef:
    APP_NAME: "metadata.labels['app.kubernetes.io/instance']"
    APP_VERSION: "metadata.labels['app.kubernetes.io/version']"
  envSecret:
    APPLICATIONINSIGHTS_CONNECTION_STRING: 'ai-u-connection-string'
    COSMOS_DB_PRIMARY_KEY: 'cosmos-u-biz-key'
    RECEIPT_INTERNAL_SUBSCRIPTION_KEY: "receiptpdfservice-internal-u-subscription-key"
    OTEL_EXPORTER_OTLP_HEADERS: 'elastic-apm-secret-token'
  keyvault:
    name: "pagopa-u-bizevents-kv"
    tenantId: "7788edaf-0346-4068-9d79-c868aed15b3d"
  nodeSelector: {}
  tolerations: []
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: node_type
                operator: In
                values:
                  - "user"
  canaryDelivery:
    create: true
    ingress:
      type: header
      headerName: X-Canary
      headerValue: canary
      weightPercent: 0
    image:
      repository: ghcr.io/pagopa/pagopa-biz-events-service
      tag: "0.5.1-4-PIDM-1536"
      pullPolicy: Always
    envConfig:
      OTEL_SERVICE_NAME: "pagopa-bizevents-service-canary"
      SERVICE_NAME: "pagopa-bizevents-service-canary"
    envSecret: {}
